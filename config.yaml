# DataJobs Server Configuration

server:
  host: "0.0.0.0"
  port: 8080

worker:
  poolSize: 10
  queueCapacity: 100
  shutdownTimeout: 30

scheduler:
  timezone: "UTC"

database:
  path: "assets/datajobs.db"
  journalMode: "WAL"

questdb:
  host: "localhost"
  port: 8812
  ilpPort: 9009
  user: "admin"
  password: "quest"
  database: "qdb"
  poolSize: 10

# Interactive Brokers Web API (Client Portal Gateway)
ib:
  baseURL: "https://localhost:5001"
  insecureSkipVerify: true
  timeout: 30s

jobs:
  - id: "bulk-es-ingest"
    name: "Bulk ES Futures Data Ingest"
    cron: "0 0 * * *"
    type: "bulk_ingest"
    handler: "bulk_ingest"
    enabled: false
    timeout: 3600
    retry:
      maxAttempts: 3
      initialDelay: 5000
      maxDelay: 300000
      multiplier: 2.0
    metadata:
      source: "/data/es-futures.csv"
      targetTable: "es_trades"
      timestampColumn: "timestamp"
      symbolColumns:
        - "symbol"
        - "exchange"
      batchSize: 50000

  - id: "incremental-trades-update"
    name: "Incremental Trades Update"
    cron: "*/5 * * * *"
    type: "incremental_update"
    handler: "incremental_update"
    enabled: false
    timeout: 300
    retry:
      maxAttempts: 5
      initialDelay: 1000
      maxDelay: 60000
      multiplier: 2.0
    metadata:
      source: "/data/incremental.csv"
      targetTable: "trades"
      timestampColumn: "ts"
      batchSize: 1000

  - id: "questdb-maintenance"
    name: "QuestDB Maintenance"
    cron: "15 * * * *"
    type: "maintenance"
    handler: "questdb_maintenance"
    enabled: false
    timeout: 600
    retry:
      maxAttempts: 2
      initialDelay: 2000
      maxDelay: 30000
      multiplier: 2.0
    metadata:
      operations:
        - "analyze"
        - "cleanup"

  - id: "ib-ping"
    name: "IB Gateway Ping"
    cron: "*/1 * * * *"  # Every minute
    type: "health_check"
    handler: "ib_ping"
    enabled: true
    timeout: 30
    retry:
      maxAttempts: 3
      initialDelay: 1000
      maxDelay: 10000
      multiplier: 2.0
    metadata:
      description: "Pings the IB Client Portal Gateway to verify connectivity"

metrics:
  enabled: true
  path: "/metrics"

tracing:
  enabled: false
  serviceName: "datajobs"
  exporterType: "stdout"
  endpoint: "localhost:4318"
  insecure: true

logging:
  level: "info"
  format: "json"