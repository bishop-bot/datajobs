# DataJobs Server Configuration

server:
  host: "0.0.0.0"
  port: 8080

worker:
  poolSize: 10
  queueCapacity: 100
  shutdownTimeout: 30

scheduler:
  timezone: "Asia/Hong_Kong"

database:
  path: "assets/datajobs.db"
  journalMode: "WAL"

questdb:
  host: "localhost"
  port: 8812          # PostgreSQL port
  ilpPort: 9009       # TCP ILP port
  ilpHTTPPort: 9000   # HTTP ILP port (same as web UI)
  user: "admin"
  password: "quest"
  database: "qdb"
  poolSize: 10

# Interactive Brokers Web API (Client Portal Gateway)
ib:
  baseURL: "https://localhost:5001"
  insecureSkipVerify: true
  timeout: 30s

# Earnings API
earnings:
  baseURL: "https://api.earningsapi.com"
  timeout: 30s
  rateLimitPerMin: 30  # Requests per minute (default: 30, max suggested: 60)

jobs:
  - id: "bulk-es-ingest"
    name: "Bulk ES Futures Data Ingest"
    cron: "0 0 * * *"
    type: "bulk_ingest"
    handler: "bulk_ingest"
    enabled: false
    timeout: 3600
    retry:
      maxAttempts: 3
      initialDelay: 5000
      maxDelay: 300000
      multiplier: 2.0
    metadata:
      source: "/data/es-futures.csv"
      targetTable: "es_trades"
      timestampColumn: "timestamp"
      symbolColumns:
        - "symbol"
        - "exchange"
      batchSize: 50000

  - id: "incremental-trades-update"
    name: "Incremental Trades Update"
    cron: "*/5 * * * *"
    type: "incremental_update"
    handler: "incremental_update"
    enabled: false
    timeout: 300
    retry:
      maxAttempts: 5
      initialDelay: 1000
      maxDelay: 60000
      multiplier: 2.0
    metadata:
      source: "/data/incremental.csv"
      targetTable: "trades"
      timestampColumn: "ts"
      batchSize: 1000

  - id: "questdb-maintenance"
    name: "QuestDB Maintenance"
    cron: "15 * * * *"
    type: "maintenance"
    handler: "questdb_maintenance"
    enabled: false
    timeout: 600
    retry:
      maxAttempts: 2
      initialDelay: 2000
      maxDelay: 30000
      multiplier: 2.0
    metadata:
      operations:
        - "analyze"
        - "cleanup"

  - id: "ib-ping"
    name: "IB Gateway Ping"
    cron: "*/5 * * * *"  # Every 5 minutes
    type: "health_check"
    handler: "ib_ping"
    enabled: true
    timeout: 30
    retry:
      maxAttempts: 3
      initialDelay: 1000
      maxDelay: 10000
      multiplier: 2.0
    metadata:
      description: "Pings the IB Client Portal Gateway to verify connectivity"

  - id: "historical-data-ingest"
    name: "Historical Market Data Ingest"
    cron: "0 6 * * *"  # Daily at 06:00 HKT
    type: "market_data"
    handler: "historical_data"
    enabled: false
    audit: true  # Enable audit logging for this job
    timeout: 7200
    retry:
      maxAttempts: 2
      initialDelay: 30000
      maxDelay: 300000
      multiplier: 2.0
    metadata:
      description: "Fetches historical OHLCV data from IB and stores in QuestDB"
      period: "5y"
      bar: "1d"
      outsideRth: false
      # Optional: specific instruments to fetch (empty = all from database)
      # instruments:
      #   - "265598"
      #   - "8314"

  - id: "earnings-sync"
    name: "Stock Earnings Daily Sync"
    cron: "0 4 * * *"  # Daily at 04:00 HKT
    type: "corporate_actions"
    handler: "earnings_sync"
    enabled: false
    audit: true  # Enable audit logging for this job
    timeout: 3600
    retry:
      maxAttempts: 3
      initialDelay: 1000
      maxDelay: 60000
      multiplier: 2.0
    metadata:
      description: "Syncs stock earnings data from Earnings API to SQLite"
      lookForwardDays: 30  # Number of days ahead to sync earnings (default: 30)

  - id: "economic-calendar-sync"
    name: "Economic Calendar Daily Sync"
    cron: "0 5 * * *"  # Daily at 05:00 HKT
    type: "economic_calendar"
    handler: "economic_calendar_sync"
    enabled: false
    audit: true  # Enable audit logging for this job
    timeout: 300
    retry:
      maxAttempts: 3
      initialDelay: 1000
      maxDelay: 60000
      multiplier: 2.0
    metadata:
      description: "Syncs economic calendar events from Earnings API to SQLite"

metrics:
  enabled: true
  path: "/metrics"

tracing:
  enabled: false
  serviceName: "datajobs"
  exporterType: "stdout"
  endpoint: "localhost:4318"
  insecure: true

logging:
  level: "info"
  format: "json"